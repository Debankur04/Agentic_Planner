version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:10000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Add any other required environment variables from your .env file
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
